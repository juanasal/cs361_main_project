<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Microservice Demo</title>
  <link rel="stylesheet" href="example.css" />
</head>
<body>

  <div class="container">
    <h1>Password Generator</h1>
    <p class="subtitle">REST API Microservice Demo Client</p>

    <div class="card">
      <label>
        Length:
        <input type="number" id="length" min="4" max="128" value="12"/>
      </label>

      <div class="options">
        <label><input type="checkbox" id="upper" checked /> Uppercase</label>
        <label><input type="checkbox" id="lower" checked /> Lowercase</label>
        <label><input type="checkbox" id="numbers" checked /> Numbers</label>
        <label><input type="checkbox" id="symbols" /> Symbols</label>
      </div>

      <button onclick="generatePassword()">Generate Password</button>

      <div class="result">
        <h2>Generated Password</h2>
        <div id="output">---</div>
      </div>
    </div>
  </div>

  <script>
    async function generatePassword() {
      const length = parseInt(document.getElementById("length").value);
      const includeUppercase = document.getElementById("upper").checked;
      const includeLowercase = document.getElementById("lower").checked;
      const includeNumbers = document.getElementById("numbers").checked;
      const includeSymbols = document.getElementById("symbols").checked;

      try {
        const response = await fetch("/generate-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            length,
            includeUppercase,
            includeLowercase,
            includeNumbers,
            includeSymbols
          })
        });

        const data = await response.json();

        if (data.password) {
          document.getElementById("output").textContent = data.password;
        } else {
          document.getElementById("output").textContent = data.error || "Error generating password";
        }

      } catch (err) {
        document.getElementById("output").textContent = "Server error or CORS issue";
        console.error(err);
      }
    }
  </script>

</body>
</html>
